<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spire</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#87CEEB}
canvas{display:block}
#ui{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:#3a2a1a;font:14px monospace;text-align:center;
  background:rgba(255,220,180,0.7);padding:8px 18px;border-radius:10px;
  backdrop-filter:blur(4px);border:1px solid rgba(200,160,100,0.3);
  pointer-events:none;
}
#hp-bar{
  position:fixed;top:24px;left:24px;width:180px;height:10px;
  background:rgba(0,0,0,0.3);border-radius:5px;
  border:1px solid rgba(200,100,50,0.3);overflow:hidden;
}
#hp-fill{width:100%;height:100%;background:linear-gradient(90deg,#cc3333,#ee6633);border-radius:5px;transition:width .25s}
#hp-label{position:fixed;top:10px;left:24px;color:#3a2a1a;font:11px monospace;opacity:.7}
#stamina-bar{
  position:fixed;top:44px;left:24px;width:120px;height:6px;
  background:rgba(0,0,0,0.3);border-radius:3px;
  border:1px solid rgba(50,120,200,0.2);overflow:hidden;
}
#stamina-fill{width:100%;height:100%;background:linear-gradient(90deg,#4488cc,#66bbee);border-radius:3px;transition:width .2s}
</style>
</head>
<body>
<div id="hp-label">HP</div>
<div id="hp-bar"><div id="hp-fill"></div></div>
<div id="stamina-bar"><div id="stamina-fill"></div></div>
<div id="ui">WASD move · Space jump · Click attack · E dodge · <b>Shift</b> lock mouse</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xc8a880, 80, 180);

const cam = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, .1, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

// === LIGHTS ===
const sun = new THREE.DirectionalLight(0xffeedd, 2.2);
sun.position.set(60, 100, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 150;
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x88aacc, 0.35));
const fill = new THREE.DirectionalLight(0x88bbff, 0.3);
fill.position.set(-30, 20, -40); scene.add(fill);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0xc8a060, 0.4));

// === SMOOTH DUNE TERRAIN ===
const gs = 120, seg = 80;
const gGeo = new THREE.PlaneGeometry(gs,gs,seg,seg);
gGeo.rotateX(-Math.PI/2);
const gp = gGeo.attributes.position;
for(let i=0;i<gp.count;i++){
  const x=gp.getX(i), z=gp.getZ(i);
  let y=0;
  y+=Math.sin(x*0.05)*Math.cos(z*0.06)*1.8;
  y+=Math.sin(x*0.09+z*0.07)*0.8;
  y+=Math.sin(x*0.03+z*0.04+1.3)*1.2;
  const d=Math.sqrt(x*x+z*z);
  if(d<5)y*=Math.max(0,(d-1)/4);
  gp.setY(i,y);
}
gGeo.computeVertexNormals();

const gMat = new THREE.MeshStandardMaterial({color:0xd4a76a,roughness:0.9,metalness:0.0,flatShading:true});
const ground = new THREE.Mesh(gGeo,gMat);
ground.receiveShadow = true;
scene.add(ground);

// === TERRAIN HEIGHT: bilinear interpolation for smooth sampling ===
function th(x,z){
  // Clamp to terrain bounds
  x=Math.max(-gs/2+0.01,Math.min(gs/2-0.01,x));
  z=Math.max(-gs/2+0.01,Math.min(gs/2-0.01,z));
  const fx=(x/gs+0.5)*seg, fz=(z/gs+0.5)*seg;
  const ix=Math.floor(fx), iz=Math.floor(fz);
  const dx=fx-ix, dz=fz-iz;
  const ix1=Math.min(ix+1,seg), iz1=Math.min(iz+1,seg);
  const get=(ix,iz)=>{
    const idx=iz*(seg+1)+ix;
    return idx>=0&&idx<gp.count?gp.getY(idx):0;
  };
  const h00=get(ix,iz), h10=get(ix1,iz);
  const h01=get(ix,iz1), h11=get(ix1,iz1);
  return h00*(1-dx)*(1-dz)+h10*dx*(1-dz)+h01*(1-dx)*dz+h11*dx*dz;
}

// === RUINS ===
function ruins(){
  const p = [[-14,-12],[18,-8],[-22,16],[24,20],[-8,-28],[32,-18],[12,-30],[-28,-24],[34,10],[-34,-6]];
  const mats = [
    new THREE.MeshStandardMaterial({color:0x8a7a5a,roughness:0.8,metalness:0.1,flatShading:true}),
    new THREE.MeshStandardMaterial({color:0x7a6a4a,roughness:0.9,metalness:0.0,flatShading:true}),
    new THREE.MeshStandardMaterial({color:0x9a8a6a,roughness:0.7,metalness:0.1,flatShading:true}),
  ];
  for(const [px,pz] of p){
    const ty=th(px,pz);
    const g=new THREE.Group();g.position.set(px,ty,pz);
    g.rotation.y=Math.random()*6;
    const m=mats[Math.floor(Math.random()*mats.length)];
    const h=1.5+Math.random()*2.5;
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(1.0,h,1.0),m);
    pillar.position.y=h/2;pillar.castShadow=true;pillar.receiveShadow=true;g.add(pillar);
    const top=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.25,1.5),mats[1]);
    top.position.y=h+0.12;g.add(top);
    // Fallen blocks — reduce how many float
    for(let i=0;i<1+Math.floor(Math.random()*2);i++){
      const fb=new THREE.Mesh(new THREE.BoxGeometry(0.4+0.5*Math.random(),0.15+0.2*Math.random(),0.4+0.5*Math.random()),mats[2]);
      const a=Math.random()*6,d=1.2+Math.random()*2;
      // Sample height at rubble position
      const rx=px+Math.cos(a)*d, rz=pz+Math.sin(a)*d;
      const rty=th(rx,rz)-ty;
      fb.position.set(Math.cos(a)*d,Math.max(0.05,rty+0.05),Math.sin(a)*d);
      fb.rotation.x=(Math.random()-0.5)*0.4;
      fb.rotation.z=(Math.random()-0.5)*0.4;
      fb.castShadow=true;fb.receiveShadow=true;g.add(fb);
    }
    scene.add(g);
  }
}
ruins();

// === SPIRE ===
function spire(){
  const sm=[new THREE.MeshStandardMaterial({color:0x8a7a6a,roughness:0.6,metalness:0.2,flatShading:true}),
    new THREE.MeshStandardMaterial({color:0x9a8a7a,roughness:0.5,metalness:0.3,flatShading:true})];
  const sx=35,sz=-28,sy=th(sx,sz);
  const b=new THREE.Mesh(new THREE.CylinderGeometry(2.5,3.5,0.8,7),sm[1]);
  b.position.set(sx,sy+0.4,sz);b.castShadow=true;b.receiveShadow=true;scene.add(b);
  const b2=new THREE.Mesh(new THREE.CylinderGeometry(0.7,2,6,8),sm[0]);
  b2.position.set(sx,sy+3.8,sz);b2.castShadow=true;b2.receiveShadow=true;scene.add(b2);
  const t=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.5,6),sm[1]);
  t.position.set(sx,sy+8.2,sz);t.castShadow=true;scene.add(t);
  const orb=new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),
    new THREE.MeshStandardMaterial({color:0xffaa44,emissive:0xff8833,emissiveIntensity:0.6}));
  orb.position.set(sx,sy+9.2,sz);scene.add(orb);
  const sl=new THREE.PointLight(0xff8833,0.3,15);
  sl.position.set(sx,sy+8.5,sz);scene.add(sl);
}
spire();

// === ROCKS ===
function rocks(){
  const mats=[new THREE.MeshStandardMaterial({color:0x7a6a4a,roughness:0.9,flatShading:true}),
    new THREE.MeshStandardMaterial({color:0x8a7a5a,roughness:0.8,flatShading:true})];
  for(let i=0;i<35;i++){
    const a=Math.random()*6,d=10+Math.random()*45;
    const x=Math.cos(a)*d,z=Math.sin(a)*d,ty=th(x,z);
    const s=0.5+Math.random()*1.5;
    const r=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),mats[Math.floor(Math.random()*2)]);
    r.position.set(x,ty+s*0.15,z);
    r.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
    r.scale.set(1,0.5+Math.random()*0.8,0.7+Math.random()*0.6);
    r.castShadow=true;r.receiveShadow=true;scene.add(r);
  }
}
rocks();

// === OASIS ===
(function(){
  const wMat=new THREE.MeshStandardMaterial({color:0x3a8a9a,roughness:0.3,metalness:0.2,transparent:true,opacity:0.75});
  const w=new THREE.Mesh(new THREE.CircleGeometry(4.5,24),wMat);
  w.rotation.x=-Math.PI/2;
  w.position.set(-28,th(-28,22)+0.05,22);w.receiveShadow=true;scene.add(w);
  const tMat=new THREE.MeshStandardMaterial({color:0x5a3a1a,roughness:0.9,flatShading:true});
  const lMat=new THREE.MeshStandardMaterial({color:0x3a8a3a,roughness:0.8,flatShading:true});
  const lMat2=new THREE.MeshStandardMaterial({color:0x4a9a4a,roughness:0.8,flatShading:true});
  const pp=[[-25,24],[-31,20],[-25,18],[-33,26],[-30,23]];
  for(const [px,pz] of pp){
    const ty=th(px,pz);
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.25,2+Math.random()),tMat);
    trunk.position.set(px,ty+1,pz);trunk.castShadow=true;scene.add(trunk);
    for(let f=0;f<5;f++){
      const fr=new THREE.Mesh(new THREE.ConeGeometry(0.7,0.08,4),f%2?lMat:lMat2);
      const a=f/5*Math.PI*2+Math.random()*0.4;
      fr.position.set(px+Math.cos(a)*0.5,ty+2.3+Math.random()*0.3,pz+Math.sin(a)*0.5);
      fr.rotation.x=Math.cos(a)*0.5;fr.rotation.z=Math.sin(a)*0.5;scene.add(fr);
    }
  }
})();

// === CLOUDS ===
(function(){
  const m=new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.35,roughness:1,metalness:0,depthWrite:false});
  for(let i=0;i<25;i++){
    const c=new THREE.Mesh(new THREE.SphereGeometry(4+Math.random()*8,6,6),m);
    c.position.set((Math.random()-0.5)*140,30+Math.random()*20,(Math.random()-0.5)*140);
    c.scale.y=0.25;scene.add(c);
  }
})();

// === CACTI ===
(function(){
  const m=new THREE.MeshStandardMaterial({color:0x3a6a3a,roughness:0.8,flatShading:true});
  const m2=new THREE.MeshStandardMaterial({color:0x4a7a4a,roughness:0.8,flatShading:true});
  for(let i=0;i<15;i++){
    const a=Math.random()*6,d=12+Math.random()*35;
    const x=Math.cos(a)*d,z=Math.sin(a)*d,ty=th(x,z);
    const h=0.8+Math.random()*1.5;
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.08+0.1*Math.random(),0.15,0.2+h,5),Math.random()>.5?m:m2);
    trunk.position.set(x,ty+h/2,z);trunk.castShadow=true;scene.add(trunk);
    if(Math.random()>.5){
      for(let j=0;j<2;j++){
        const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.3+0.4*Math.random(),4),m);
        const ang=j*Math.PI+(Math.random()-0.5)*0.5;
        arm.position.set(x+Math.cos(ang)*0.2,ty+h*0.6,z+Math.sin(ang)*0.2);
        arm.rotation.z=Math.cos(ang)*0.8;arm.rotation.x=Math.sin(ang)*0.8;arm.castShadow=true;scene.add(arm);
      }
    }
  }
})();

// === HEAT HAZE ===
const hhGeo=new THREE.BufferGeometry();
const hhPos=new Float32Array(100*3);
for(let i=0;i<100;i++){
  const a=Math.random()*6,d=3+Math.random()*50;
  hhPos[i*3]=Math.cos(a)*d;hhPos[i*3+1]=0.5+Math.random()*4;hhPos[i*3+2]=Math.sin(a)*d;
}
hhGeo.setAttribute('position',new THREE.BufferAttribute(hhPos,3));
const hh=new THREE.Points(hhGeo,new THREE.PointsMaterial({color:0xffeedd,size:0.05,transparent:true,opacity:0.15,sizeAttenuation:true}));
scene.add(hh);

// === PLAYER ===
const player=new THREE.Group();

// Body
const bm=new THREE.MeshStandardMaterial({color:0x2a4a6a,roughness:0.6,metalness:0.1,flatShading:true});
const body=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,1.1,6),bm);
body.position.y=1.1;body.castShadow=true;player.add(body);

const cm=new THREE.MeshStandardMaterial({color:0x6a5a4a,roughness:0.8,flatShading:true});
const cloak=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.85,0.4,6),cm);
cloak.position.y=0.3;player.add(cloak);

const hm=new THREE.MeshStandardMaterial({color:0xc8a88a,roughness:0.7,flatShading:true});
const head=new THREE.Mesh(new THREE.SphereGeometry(0.35,6,6),hm);
head.position.y=1.6;head.castShadow=true;player.add(head);

const em=new THREE.MeshStandardMaterial({color:0x2a1a0a,depthWrite:true});
const e1=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),em);
e1.position.set(-0.1,1.7,0.32);player.add(e1);
const e2=new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),em);
e2.position.set(0.1,1.7,0.32);player.add(e2);

// Sword
const sMat=new THREE.MeshStandardMaterial({color:0x889999,roughness:0.3,metalness:0.6,flatShading:true});
const shMat=new THREE.MeshStandardMaterial({color:0x4a3a2a,roughness:0.8,flatShading:true});
const sg=new THREE.Group();
sg.add(new THREE.Mesh(new THREE.BoxGeometry(0.04,0.7,0.14),sMat)).position.set(0.05,0.5,0);
sg.add(new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.35,4),shMat)).position.set(0,0,0);
sg.add(new THREE.Mesh(new THREE.BoxGeometry(0.25,0.04,0.08),shMat)).position.set(0,0.12,0);
sg.position.set(0.55,0.55,0.3);
// Rotate sword to hang on right side
sg.rotation.z = -0.15;
player.add(sg);
player.sword=sg;
player.swordBP=new THREE.Vector3(0.55,0.65,0.3);

// Legs — longer
const lm=new THREE.MeshStandardMaterial({color:0x1a2a3a,roughness:0.7,flatShading:true});
for(const s of[-0.18,0.18]){
  const l=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.13,1.0,4),lm);
  l.position.set(s,0.5,0);l.castShadow=true;player.add(l);
}

// State
player.vel=new THREE.Vector3();
player.onGround=true;
player.hp=100;player.maxHp=100;
player.stamina=100;player.maxStamina=100;
player.attacking=false;player.attackT=0;player.attackCD=0;
player.dodging=false;player.dodgeT=0;player.dodgeCD=0;

player.position.set(0,th(0,0)+0.5,0);
scene.add(player);

// === CAMERA ===
let cTheta=0,cPhi=Math.PI/3.2,cDist=7;
const lookT=new THREE.Vector3();
let locked=false;

document.addEventListener('keydown',e=>{if(e.key==='Shift'){if(locked)document.exitPointerLock();else renderer.domElement.requestPointerLock();}});
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===renderer.domElement});
document.addEventListener('mousemove',e=>{if(!locked||player.dodging)return;cTheta-=e.movementX*0.003;cPhi=Math.max(0.3,Math.min(Math.PI-0.3,cPhi-e.movementY*0.003));});

// === INPUT ===
const K={};
document.addEventListener('keydown',e=>{
  K[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='e'&&!player.dodging&&player.dodgeCD<=0&&player.stamina>=25)dodge();
});
document.addEventListener('keyup',e=>{K[e.key.toLowerCase()]=false});
renderer.domElement.addEventListener('mousedown',e=>{if(e.button===0&&locked&&!player.attacking&&player.attackCD<=0)attack();});

function dodge(){
  player.dodging=true;player.dodgeT=0.35;player.stamina=Math.max(0,player.stamina-25);
  const f=new THREE.Vector3(-Math.sin(cTheta),0,-Math.cos(cTheta));
  const r=new THREE.Vector3(Math.cos(cTheta),0,-Math.sin(cTheta));
  let d=new THREE.Vector3();
  if(K['w'])d.add(f);if(K['s'])d.sub(f);if(K['a'])d.sub(r);if(K['d'])d.add(r);
  if(d.length()<0.1)d.copy(f);d.normalize();
  player.vel.copy(d.multiplyScalar(14));player.vel.y=3;
}

function attack(){
  player.attacking=true;player.attackT=0.25;player.attackCD=0.35;
  const smat=new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:0.6,side:THREE.DoubleSide,depthWrite:false});
  const s=new THREE.Mesh(new THREE.RingGeometry(0.1,1.2,12,1),smat);
  const fwd=new THREE.Vector3(-Math.sin(cTheta),0.4,-Math.cos(cTheta));
  s.position.copy(player.position);s.position.add(fwd.multiplyScalar(1.8));s.position.y+=1.2;
  s.lookAt(cam.position);s.rotation.z=Math.random()*0.3-0.15;s.scale.set(0.3,0.3,0.3);
  scene.add(s);
  let t=0;
  const anim=()=>{t+=0.03;s.scale.setScalar(0.3+t*4);s.material.opacity=Math.max(0,0.6-t*1.5);if(t>0.5){scene.remove(s);return}requestAnimationFrame(anim);};
  anim();
}

// === UPDATE (smooth movement) ===
let prevT=performance.now();
function update(dt){
  if(dt>0.1)dt=0.1;

  if(player.dodging){player.dodgeT-=dt;if(player.dodgeT<=0){player.dodging=false;player.dodgeCD=0.5}}
  if(player.dodgeCD>0)player.dodgeCD-=dt;
  if(player.attacking){player.attackT-=dt;if(player.attackT<=0)player.attacking=false}
  if(player.attackCD>0)player.attackCD-=dt;

  // Sword bob/attack
  if(!player.attacking){
    player.sword.position.set(player.swordBP.x,player.swordBP.y+Math.sin(performance.now()*0.004)*0.04,player.swordBP.z);
    player.sword.rotation.x=0;
  }else player.sword.rotation.x=-Math.sin(player.attackT*10)*1.2;

  if(!player.dodging&&player.stamina<player.maxStamina)player.stamina=Math.min(player.maxStamina,player.stamina+8*dt);

  if(!player.dodging){
    const spd=5.5,acc=12;
    const f=new THREE.Vector3(-Math.sin(cTheta),0,-Math.cos(cTheta));
    const r=new THREE.Vector3(Math.cos(cTheta),0,-Math.sin(cTheta));
    const md=new THREE.Vector3();
    if(K['w']||K['arrowup'])md.add(f);
    if(K['s']||K['arrowdown'])md.sub(f);
    if(K['a']||K['arrowleft'])md.sub(r);
    if(K['d']||K['arrowright'])md.add(r);
    if(md.length()>0){md.normalize();player.vel.x+=(md.x*spd-player.vel.x)*Math.min(1,acc*dt);player.vel.z+=(md.z*spd-player.vel.z)*Math.min(1,acc*dt);}
    else{player.vel.x*=Math.max(0,1-10*dt);player.vel.z*=Math.max(0,1-10*dt);}
    if(K[' ']&&player.onGround&&player.stamina>=10){player.vel.y=7;player.onGround=false;player.stamina-=10;K[' ']=false;}
  }

  player.vel.y-=22*dt;
  player.position.x+=player.vel.x*dt;
  player.position.z+=player.vel.z*dt;

  // Perfect ground clamp — every frame, no exceptions
  const ty=th(player.position.x,player.position.z);
  const targetY=ty+0.5;
  if(!player.dodging && player.vel.y<0.5){
    // Force lock to ground when not jumping/dodging upward
    player.position.y=targetY;
    player.vel.y=0;
    player.onGround=true;
  }else if(player.position.y<targetY+0.01){
    player.position.y=targetY;
    player.vel.y=0;
    player.onGround=true;
  }else{
    // In air — let gravity work
    player.onGround=false;
  }
  // Always follow terrain height when grounded — this runs every frame
  if(player.onGround){
    const newTy=th(player.position.x,player.position.z);
    player.position.y=newTy+0.5;
  }

  const mx=gs/2-3;
  if(Math.abs(player.position.x)>mx){player.position.x=Math.sign(player.position.x)*mx;player.vel.x*=-0.5}
  if(Math.abs(player.position.z)>mx){player.position.z=Math.sign(player.position.z)*mx;player.vel.z*=-0.5}

  if(player.vel.lengthSq()>0.3&&!player.dodging){
    const tr=Math.atan2(player.vel.x,player.vel.z);
    let d=tr-player.rotation.y;
    while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;
    player.rotation.y+=d*Math.min(1,8*dt);
  }
}

function updateCam(){
  const off=new THREE.Vector3(cDist*Math.sin(cTheta)*Math.sin(cPhi),cDist*Math.cos(cPhi),cDist*Math.cos(cTheta)*Math.sin(cPhi));
  cam.position.lerp(new THREE.Vector3(player.position.x+off.x,player.position.y+off.y,player.position.z+off.z),0.12);
  lookT.lerp(new THREE.Vector3(player.position.x,player.position.y+1.2,player.position.z),0.12);
  cam.lookAt(lookT);
}

function updateUI(){
  document.getElementById('hp-fill').style.width=Math.max(0,(player.hp/player.maxHp)*100)+'%';
  document.getElementById('stamina-fill').style.width=Math.max(0,(player.stamina/player.maxStamina)*100)+'%';
}

function loop(){
  requestAnimationFrame(loop);
  const n=performance.now(),dt=(n-prevT)/1000;prevT=n;
  update(dt);updateCam();updateUI();
  const hhp=hh.geometry.attributes.position.array;
  for(let i=0;i<100;i++)hhp[i*3+1]+=Math.sin(n*0.001+i)*0.003;
  hh.geometry.attributes.position.needsUpdate=true;
  renderer.render(scene,cam);
}
loop();

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>
</body>
